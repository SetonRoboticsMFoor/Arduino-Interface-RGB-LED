<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RGB LED Controller Studio</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --card-border: rgba(255, 255, 255, 0.1);
      --accent-cyan: #38bdf8;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }

    .container {
      background: var(--card-bg);
      width: 100%;
      max-width: 460px;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      border: 1px solid var(--card-border);
    }

    h1 {
      font-size: 22px;
      margin-top: 0;
      margin-bottom: 20px;
      text-align: center;
      letter-spacing: 0.5px;
    }

    .btn-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    button {
      flex: 1;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .connect-btn { background-color: var(--accent-cyan); color: #0f172a; }
    .connect-btn:hover:not(:disabled) { background-color: #0284c7; color: white; }

    .disconnect-btn { background-color: #334155; color: var(--text-muted); }
    .disconnect-btn:hover:not(:disabled) { background-color: #ef4444; color: white; }

    button:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Picker Layout Grid */
    .picker-container {
      display: flex;
      gap: 15px;
      height: 200px;
      margin-bottom: 20px;
    }

    /* 2D Canvas Box (Saturation/Value) */
    .canvas-wrapper {
      position: relative;
      flex: 1;
      height: 100%;
      border-radius: 10px;
      overflow: hidden;
      cursor: crosshair;
      border: 1px solid var(--card-border);
    }

    #colorCanvas { width: 100%; height: 100%; display: block; }

    .picker-cursor {
      position: absolute;
      width: 12px;
      height: 12px;
      border: 2px solid white;
      border-radius: 50%;
      box-shadow: 0 0 4px rgba(0,0,0,0.8);
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    /* Vertical Hue Bar */
    .hue-wrapper {
      width: 28px;
      height: 100%;
      position: relative;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--card-border);
    }

    #hueSlider {
      -webkit-appearance: none;
      appearance: none;
      width: 200px;
      height: 28px;
      background: linear-gradient(to right, #f00, #ff0, #0f0, #0ff, #00f, #f0f, #f00);
      transform: rotate(90deg);
      transform-origin: 14px 14px;
      cursor: pointer;
      border-radius: 6px;
    }

    /* Numerical RGB Inputs */
    .rgb-inputs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      background: rgba(0, 0, 0, 0.2);
      padding: 8px;
      border-radius: 8px;
      border: 1px solid var(--card-border);
    }

    .input-group label {
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .input-group input {
      width: 100%;
      background: transparent;
      border: none;
      color: var(--text-main);
      text-align: center;
      font-size: 16px;
      font-family: monospace;
      outline: none;
    }

    /* Format Code Card */
    .info-card {
      background: rgba(0, 0, 0, 0.3);
      padding: 12px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-family: monospace;
      font-size: 14px;
      margin-bottom: 20px;
      border: 1px solid var(--card-border);
    }

    .preview-dot {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Preset Palette Buttons */
    .presets {
      display: flex;
      justify-content: space-between;
      gap: 8px;
    }

    .swatch {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.2);
      cursor: pointer;
      transition: transform 0.15s ease;
    }

    .swatch:hover { transform: scale(1.15); }
  </style>
</head>
<body>

  <div class="container">
    <h1>RGB Studio</h1>

    <div class="btn-group">
      <button id="connectBtn" class="connect-btn">Connect</button>
      <button id="disconnectBtn" class="disconnect-btn" disabled>Disconnect</button>
    </div>

    <div class="picker-container">
      <div class="canvas-wrapper" id="canvasWrapper">
        <canvas id="colorCanvas"></canvas>
        <div class="picker-cursor" id="pickerCursor"></div>
      </div>
      <div class="hue-wrapper">
        <input type="range" id="hueSlider" min="0" max="360" value="0">
      </div>
    </div>

    <div class="rgb-inputs">
      <div class="input-group">
        <label style="color: #ef4444;">R</label>
        <input type="number" id="rInput" min="0" max="255" value="255" disabled>
      </div>
      <div class="input-group">
        <label style="color: #22c55e;">G</label>
        <input type="number" id="gInput" min="0" max="255" value="0" disabled>
      </div>
      <div class="input-group">
        <label style="color: #3b82f6;">B</label>
        <input type="number" id="bInput" min="0" max="255" value="0" disabled>
      </div>
    </div>

    <div class="info-card">
      <div>
        <span id="hexCode" style="color: var(--accent-cyan);">#FF0000</span>
        <span id="rgbCode" style="color: var(--text-muted); margin-left: 10px;">rgb(255, 0, 0)</span>
      </div>
      <div id="previewDot" class="preview-dot" style="background-color: rgb(255,0,0);"></div>
    </div>

    <div class="presets">
      <div class="swatch" style="background: #ff0000;" onclick="applyColor(255,0,0)"></div>
      <div class="swatch" style="background: #00ff00;" onclick="applyColor(0,255,0)"></div>
      <div class="swatch" style="background: #0000ff;" onclick="applyColor(0,0,255)"></div>
      <div class="swatch" style="background: #ffff00;" onclick="applyColor(255,255,0)"></div>
      <div class="swatch" style="background: #00ffff;" onclick="applyColor(0,255,255)"></div>
      <div class="swatch" style="background: #ff00ff;" onclick="applyColor(255,0,255)"></div>
      <div class="swatch" style="background: #ffffff;" onclick="applyColor(255,255,255)"></div>
      <div class="swatch" style="background: #000000;" onclick="applyColor(0,0,0)"></div>
    </div>
  </div>

  <script>
    let port, writer, textEncoder, writableStreamClosed;

    let currentHue = 0;
    let currentSat = 1;
    let currentVal = 1;
    let isDragging = false;

    const canvas = document.getElementById('colorCanvas');
    const ctx = canvas.getContext('2d');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const cursor = document.getElementById('pickerCursor');
    const hueSlider = document.getElementById('hueSlider');

    const rInput = document.getElementById('rInput');
    const gInput = document.getElementById('gInput');
    const bInput = document.getElementById('bInput');

    const hexCode = document.getElementById('hexCode');
    const rgbCode = document.getElementById('rgbCode');
    const previewDot = document.getElementById('previewDot');

    const connectBtn = document.getElementById('connectBtn');
    const disconnectBtn = document.getElementById('disconnectBtn');

    // Resize canvas resolution to container
    function initCanvas() {
      canvas.width = canvasWrapper.clientWidth;
      canvas.height = canvasWrapper.clientHeight;
      drawCanvas();
    }

    // Draw Saturation/Value Gradient Box for active Hue
    function drawCanvas() {
      ctx.fillStyle = `hsl(${currentHue}, 100%, 50%)`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // White horizontal gradient (Saturation)
      const gradWhite = ctx.createLinearGradient(0, 0, canvas.width, 0);
      gradWhite.addColorStop(0, 'rgba(255,255,255,1)');
      gradWhite.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = gradWhite;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Black vertical gradient (Value / Brightness)
      const gradBlack = ctx.createLinearGradient(0, 0, 0, canvas.height);
      gradBlack.addColorStop(0, 'rgba(0,0,0,0)');
      gradBlack.addColorStop(1, 'rgba(0,0,0,1)');
      ctx.fillStyle = gradBlack;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    // Convert HSV to RGB
    function hsvToRgb(h, s, v) {
      let r, g, b;
      let i = Math.floor(h * 6);
      let f = h * 6 - i;
      let p = v * (1 - s);
      let q = v * (1 - f * s);
      let t = v * (1 - (1 - f) * s);

      switch (i % 6) {
        case 0: r = v; g = t; b = p; break;
        case 1: r = q; g = v; b = p; break;
        case 2: r = p; g = v; b = t; break;
        case 3: r = p; g = q; b = v; break;
        case 4: r = t; g = p; b = v; break;
        case 5: r = v; g = p; b = q; break;
      }
      return [Math.round(r * 255), Math.round(g * 255), Math.round(b * 255)];
    }

    // Convert RGB to HSV
    function rgbToHsv(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      let max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, v = max;
      let d = max - min;
      s = max === 0 ? 0 : d / max;

      if (max === min) {
        h = 0;
      } else {
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return [h * 360, s, v];
    }

    // Update UI Elements & Hardware Output
    function updateState(r, g, b, source = '') {
      rInput.value = r;
      gInput.value = g;
      bInput.value = b;

      const hex = "#" + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1).toUpperCase();
      hexCode.textContent = hex;
      rgbCode.textContent = `rgb(${r}, ${g}, ${b})`;
      previewDot.style.backgroundColor = `rgb(${r},${g},${b})`;

      // Reposition cursor if not dragging canvas directly
      if (source !== 'canvas') {
        const [h, s, v] = rgbToHsv(r, g, b);
        currentHue = h;
        currentSat = s;
        currentVal = v;

        hueSlider.value = currentHue;
        drawCanvas();

        const x = currentSat * canvas.width;
        const y = (1 - currentVal) * canvas.height;
        cursor.style.left = `${x}px`;
        cursor.style.top = `${y}px`;
      }

      sendRGB(r, g, b);
    }

    function handleCanvasPointer(e) {
      const rect = canvas.getBoundingClientRect();
      let x = Math.max(0, Math.min(e.clientX - rect.left, rect.width));
      let y = Math.max(0, Math.min(e.clientY - rect.top, rect.height));

      cursor.style.left = `${x}px`;
      cursor.style.top = `${y}px`;

      currentSat = x / rect.width;
      currentVal = 1 - (y / rect.height);

      const [r, g, b] = hsvToRgb(currentHue / 360, currentSat, currentVal);
      updateState(r, g, b, 'canvas');
    }

    // Canvas Mouse Events
    canvasWrapper.addEventListener('mousedown', (e) => { isDragging = true; handleCanvasPointer(e); });
    window.addEventListener('mousemove', (e) => { if (isDragging) handleCanvasPointer(e); });
    window.addEventListener('mouseup', () => { isDragging = false; });

    // Hue Bar Event
    hueSlider.addEventListener('input', () => {
      currentHue = hueSlider.value;
      drawCanvas();
      const [r, g, b] = hsvToRgb(currentHue / 360, currentSat, currentVal);
      updateState(r, g, b, 'hue');
    });

    // Numerical Input Listeners
    [rInput, gInput, bInput].forEach(input => {
      input.addEventListener('change', () => {
        let r = Math.min(255, Math.max(0, parseInt(rInput.value) || 0));
        let g = Math.min(255, Math.max(0, parseInt(gInput.value) || 0));
        let b = Math.min(255, Math.max(0, parseInt(bInput.value) || 0));
        updateState(r, g, b, 'input');
      });
    });

    // Preset Swatches
    function applyColor(r, g, b) {
      updateState(r, g, b, 'swatch');
    }

    // Send command over Web Serial
    async function sendRGB(r, g, b) {
      if (writer) {
        try {
          await writer.write(`${r},${g},${b}\n`);
        } catch (err) {
          console.warn('Write skipped:', err);
        }
      }
    }

    // Connect to Serial Port
    connectBtn.addEventListener('click', async () => {
      if ('serial' in navigator) {
        try {
          port = await navigator.serial.requestPort();
          await port.open({ baudRate: 9600 });

          textEncoder = new TextEncoderStream();
          writableStreamClosed = textEncoder.readable.pipeTo(port.writable);
          writer = textEncoder.writable.getWriter();

          connectBtn.disabled = true;
          disconnectBtn.disabled = false;

          rInput.disabled = false;
          gInput.disabled = false;
          bInput.disabled = false;

        } catch (err) {
          console.error('Error connecting:', err);
          alert('Failed to connect: ' + err.message);
        }
      } else {
        alert('Web Serial API is not supported in this browser.');
      }
    });

    // Disconnect safely
    disconnectBtn.addEventListener('click', async () => {
      if (port) {
        try {
          if (writer) {
            try { await writer.write('0,0,0\n'); } catch (e) {}
            try { await writer.close(); } catch (e) {}
            writer.releaseLock();
            writer = null;
          }

          if (textEncoder) {
            try { await textEncoder.readable.cancel(); } catch (e) {}
            await writableStreamClosed.catch(() => {});
          }

          await port.close();
        } catch (err) {
          console.warn('Disconnect cleanup warning:', err);
        } finally {
          port = null;

          connectBtn.disabled = false;
          disconnectBtn.disabled = true;

          rInput.disabled = true;
          gInput.disabled = true;
          bInput.disabled = true;

          applyColor(0, 0, 0);
        }
      }
    });

    // Initialize Canvas on load
    window.addEventListener('load', () => {
      initCanvas();
      applyColor(255, 0, 0);
    });
    window.addEventListener('resize', initCanvas);
  </script>
</body>
</html>
